<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
          integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pb-10">

    <div id="toast"></div>

    <!-- ── Sticky header ──────────────────────────────────────── -->
    <header class="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
        <div class="flex items-center justify-between px-4 pt-4 pb-3">
            <h1 class="text-xl font-bold text-gray-800">Workout Tracker</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="btn btn-info btn-xs">
                    <i class="fas fa-download mr-1"></i> Export
                </button>
                <label class="btn btn-accent btn-xs cursor-pointer">
                    <i class="fas fa-upload mr-1"></i> Import
                    <input type="file" accept=".json" onchange="importData(event)" class="hidden">
                </label>
            </div>
        </div>

        <!-- Mobile-only tab bar -->
        <nav class="tab-bar" role="tablist">
            <button id="tab-push" onclick="showTab('push')" class="tab-btn active" role="tab">Push</button>
            <button id="tab-pull" onclick="showTab('pull')" class="tab-btn"        role="tab">Pull</button>
            <button id="tab-legs" onclick="showTab('legs')" class="tab-btn"        role="tab">Legs</button>
        </nav>
    </header>

    <!-- ── Main content ───────────────────────────────────────── -->
    <main class="px-4 pt-4 lg:px-8 lg:pt-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Push Day -->
            <div id="push-section" class="workout-card" role="tabpanel">
                <div class="card-header">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-700">Push Day</h2>
                        <p class="text-sm text-gray-500">
                            Last: <span id="push-last-date" class="text-gray-400">Never</span>
                            &mdash; <span id="push-days-ago" class="font-medium text-gray-400">N/A</span> days ago
                        </p>
                    </div>
                    <button onclick="markDone('push')" class="btn btn-primary btn-sm">Mark Done</button>
                </div>
                <div id="push-exercises" class="space-y-3"></div>
                <div class="add-exercise-form">
                    <input type="text" id="new-push-exercise" placeholder="New exercise name">
                    <button onclick="addExercise('push')" class="btn btn-accent btn-sm">Add</button>
                </div>
            </div>

            <!-- Pull Day -->
            <div id="pull-section" class="workout-card tab-hidden" role="tabpanel">
                <div class="card-header">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-700">Pull Day</h2>
                        <p class="text-sm text-gray-500">
                            Last: <span id="pull-last-date" class="text-gray-400">Never</span>
                            &mdash; <span id="pull-days-ago" class="font-medium text-gray-400">N/A</span> days ago
                        </p>
                    </div>
                    <button onclick="markDone('pull')" class="btn btn-primary btn-sm">Mark Done</button>
                </div>
                <div id="pull-exercises" class="space-y-3"></div>
                <div class="add-exercise-form">
                    <input type="text" id="new-pull-exercise" placeholder="New exercise name">
                    <button onclick="addExercise('pull')" class="btn btn-accent btn-sm">Add</button>
                </div>
            </div>

            <!-- Legs Day -->
            <div id="legs-section" class="workout-card tab-hidden" role="tabpanel">
                <div class="card-header">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-700">Legs Day</h2>
                        <p class="text-sm text-gray-500">
                            Last: <span id="legs-last-date" class="text-gray-400">Never</span>
                            &mdash; <span id="legs-days-ago" class="font-medium text-gray-400">N/A</span> days ago
                        </p>
                    </div>
                    <button onclick="markDone('legs')" class="btn btn-primary btn-sm">Mark Done</button>
                </div>
                <div id="legs-exercises" class="space-y-3"></div>
                <div class="add-exercise-form">
                    <input type="text" id="new-legs-exercise" placeholder="New exercise name">
                    <button onclick="addExercise('legs')" class="btn btn-accent btn-sm">Add</button>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
